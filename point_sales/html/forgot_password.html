<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password</title>
    <link rel="stylesheet" href="/css/forgot_password.css">
</head>
<body>
    <div class="forgot-container">
        <h2>Forgot Password</h2>
        <form id="forgotForm" method="POST">
            <input type="text" name="username_or_email" placeholder="Enter your username or email" required>
            <button type="submit">Next</button>
        </form>
        <form id="resetForm" method="POST" style="display:none;">
            <input type="hidden" name="username_or_email" id="reset_username_or_email">
            <input type="password" name="new_password" placeholder="New password" required>
            <input type="password" name="confirm_password" placeholder="Confirm password" required>
            <button type="submit">Reset Password</button>
        </form>
        <div id="message"></div>
        <div class="back-link">
            <a href="/html/index.html">Back to Login</a>
        </div>
    </div>
    <script>
        const forgotForm = document.getElementById('forgotForm');
        const resetForm = document.getElementById('resetForm');
        const message = document.getElementById('message');

        forgotForm.addEventListener('submit', function(e) {
            e.preventDefault();
            message.style.color = '';
            message.innerHTML = "Checking...";
            let formData = new FormData(forgotForm);
            formData.append('step', 'check_user');
            fetch('/php/forgot_password.php', {
                method: 'POST',
                body: formData
            })
            .then(resp => resp.json())
            .then(data => {
                if(data.success){
                    message.style.color = 'green';
                    message.innerHTML = "Account found. Please enter your new password.";
                    // Show reset password form
                    document.getElementById('reset_username_or_email').value = forgotForm.username_or_email.value;
                    forgotForm.style.display = 'none';
                    resetForm.style.display = '';
                } else {
                    message.style.color = 'red';
                    message.innerHTML = data.error || 'An error occurred.';
                }
            })
            .catch(() => {
                message.style.color = 'red';
                message.innerHTML = 'An error occurred.';
            });
        });

        resetForm.addEventListener('submit', function(e) {
            e.preventDefault();
            message.style.color = '';
            message.innerHTML = "Resetting password...";
            let formData = new FormData(resetForm);
            formData.append('step', 'reset_password');
            fetch('/php/forgot_password.php', {
                method: 'POST',
                body: formData
            })
            .then(resp => resp.json())
            .then(data => {
                if(data.success){
                    message.style.color = 'green';
                    message.innerHTML = data.success;
                    resetForm.reset();
                    setTimeout(()=>window.location.href='/html/index.html', 2000);
                } else {
                    message.style.color = 'red';
                    message.innerHTML = data.error || 'An error occurred.';
                }
            })
            .catch(() => {
                message.style.color = 'red';
                message.innerHTML = 'An error occurred.';
            });
        });
    </script>
</body>
</html>
